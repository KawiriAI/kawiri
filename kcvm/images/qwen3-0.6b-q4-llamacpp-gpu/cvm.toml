# CVM image configuration — llama.cpp Q4 GPU inference (NVIDIA CC)
# Built by cvmbuild (pure Rust CVM image builder)
#
# Tested on: AMD EPYC 9124 + H100 PCIe, SEV-SNP, CC mode ON
# Performance: ~350-400 tok/s (Qwen3-0.6B-Q4_0, single H100)

[image]
id = "qwen3-0.6b-q4-llamacpp-gpu"
version = "0.1.0"
base = "Dockerfile"
context = "../.."
base_image = "cvm-gpu-base:latest"
base_image_dockerfile = "base-image/Dockerfile.gpu"
kawa_version = "0.1.1"
ovmf_version = "0.1.0"

[kernel]
cmdline = "root=/dev/mapper/root init=/usr/lib/systemd/systemd lockdown=confidentiality intel_iommu=on amd_iommu=on iommu=pt systemd.verity_root_options=panic-on-corruption noresume modprobe.blacklist=ahci i8042.noaux i8042.nokbd pci=realloc,nocrs"
initrd_modules = ["dm-verity", "dm-mod", "dm-bufio", "squashfs", "virtio-blk", "virtio-pci", "virtio-net", "virtio-scsi", "nf_tables", "nfnetlink", "nf_conntrack", "vfio-pci", "ecdsa_generic", "ecdh"]

[verity]
enabled = true
panic_on_corruption = true

[security]
remove = ["bash", "sh", "dash", "csh", "tcsh", "zsh", "fish", "ksh", "rbash", "busybox", "apt", "apt-get", "apt-cache", "apt-config", "apt-key", "apt-mark", "dpkg", "dpkg-deb", "dpkg-query", "pip", "pip3", "dmsetup"]
remove_dirs = ["/usr/lib/apt", "/var/lib/apt", "/var/lib/dpkg"]
lock_modules = true

[firewall]
inbound = [{ port = 8443, proto = "tcp" }]
outbound = "deny"

[[verity_disks]]
name = "models"
device = "vdb"
mountpoint = "/mnt/models"
description = "model weights disk"
source = "disks/models"

[[verity_disks]]
name = "config"
device = "vdc"
mountpoint = "/mnt/config"
description = "configuration disk"

[config_env]
LLAMACPP_MODEL = "/mnt/models/Qwen3-0.6B-GGUF/Qwen3-0.6B-Q4_0.gguf"
LLAMACPP_THREADS = "4"
LLAMACPP_GPU_LAYERS = "99"
UPSTREAM_URL = "http://127.0.0.1:8080"
ENABLE_PQ = "true"

[[models]]
repo = "ggml-org/Qwen3-0.6B-GGUF"
include = ["*Q4_0*"]

[services]

[services.network]
ntp_servers = ["162.159.200.1", "162.159.200.123"]

[[services.mounts]]
what = "configfs"
where = "/sys/kernel/config"
type = "configfs"
description = "Kernel Configuration File System"
condition_path_exists = "/sys/kernel/config"

[[services.units]]
name = "llamacpp"
description = "llama.cpp CUDA GPU inference server"
exec = "/usr/local/bin/llama-server --model ${LLAMACPP_MODEL} --host 127.0.0.1 --port 8080 --ctx-size 2048 --threads ${LLAMACPP_THREADS} --n-gpu-layers ${LLAMACPP_GPU_LAYERS} --chat-template chatml"
after = ["verity-config.service", "verity-models.service", "lock-modules.service", "kawa.service"]
requires = ["verity-config.service", "verity-models.service"]
wants = ["kawa.service"]
environment_file = "/mnt/config/config.env"
environment = ["LD_LIBRARY_PATH=/usr/local/lib"]
hardening = "full"
user = "llamacpp"
supplementary_groups = ["video", "render"]
unset_environment = ["LD_PRELOAD"]
extra_options = [
  "SystemCallFilter=@system-service @resources @ipc ioctl mmap mprotect",
  "RestrictNamespaces=no",
  "TimeoutStartSec=120",
  "StartLimitBurst=3",
  "StartLimitIntervalSec=120",
  "DeviceAllow=/dev/nvidia0 rw",
  "DeviceAllow=/dev/nvidiactl rw",
  "DeviceAllow=/dev/nvidia-uvm rw",
  "DeviceAllow=/dev/nvidia-uvm-tools rw",
  "MemoryDenyWriteExecute=no",
  "PrivateDevices=no",
]

[[services.units]]
name = "nvidia-persistenced"
description = "NVIDIA Persistence Daemon (keeps SPDM session alive for GPU CC attestation)"
exec = "/usr/bin/nvidia-persistenced --uvm-persistence-mode --verbose"
after = ["lock-modules.service"]
hardening = "minimal"
read_write_paths = ["/run"]
device_allow = ["/dev/nvidia0 rw", "/dev/nvidiactl rw"]
extra_options = [
  "PrivateDevices=no",
  "StartLimitBurst=3",
  "StartLimitIntervalSec=60",
]

[[services.units]]
name = "kawa"
description = "Kawa Noise_XX TLS proxy"
exec = "/usr/local/bin/kawa"
after = ["verity-config.service", "sys-kernel-config.mount", "network-online.target", "lock-modules.service", "nvidia-persistenced.service"]
requires = ["verity-config.service", "sys-kernel-config.mount"]
wants = ["network-online.target", "llamacpp.service", "nvidia-persistenced.service"]
environment_file = "/mnt/config/config.env"
unset_environment = ["LD_PRELOAD", "LD_LIBRARY_PATH"]
hardening = "full"
read_write_paths = ["/sys/kernel/config"]
device_allow = ["/dev/sev-guest rw", "/dev/tdx-guest rw", "/dev/nvidiactl rw", "/dev/nvidia0 rw"]
extra_options = [
  "MemoryDenyWriteExecute=yes",
  "InaccessiblePaths=/dev/shm",
  "ProtectKernelTunables=no",
  "PrivateDevices=no",
  "StartLimitBurst=5",
  "StartLimitIntervalSec=60",
]

[manifest]

[manifest.snp]
guest_features = 1
ovmf_file = "OVMF.fd"

[manifest.tdx]
ovmf_file = "OVMF_TDX.fd"

[assert]
profile = "production"
exclude = ["service_no_protect_kernel_tunables_off", "service_no_memory_deny_off"]
