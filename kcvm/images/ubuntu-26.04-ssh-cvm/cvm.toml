# ubuntu-26.04-ssh-cvm — attestation-gated SSH-able CVM
#
# Operators tunnel into this image through konnect-proxy:
#
#   konnect-proxy --to wss://my-host:13212 --tunnel 2222:22 \
#     --manifest ./build/manifest.json
#   ssh -i kawiri-test -o StrictHostKeyChecking=no \
#     -o UserKnownHostsFile=/dev/null -p 2222 root@127.0.0.1
#
# kawa runs in standalone+tunnel mode (no inference upstream). The only
# inbound port on the CVM is 8443/tcp (kawa); SSH binds 127.0.0.1 inside
# the CVM and is reachable solely through kawa's tunnel mode after the
# attestation handshake.
#
# Security boundary:
#   - Host operator can't see VM memory / disk (TEE).
#   - Anyone with kawiri-test's *private* key + reachable kawa endpoint
#     gets root in the VM. The TEST keypair's pubkey is baked into the
#     rootfs (overlay/root/.ssh/authorized_keys); a different pubkey
#     produces a different SNP measurement, which is the right property.
#     Production users fork this image and bake their own pubkey.

[image]
id = "ubuntu-26.04-ssh-cvm"
version = "0.1.0"
base = "Dockerfile"
context = "../.."
ovmf_version = "0.1.0"

[kernel]
cmdline = "root=/dev/mapper/root init=/usr/lib/systemd/systemd lockdown=confidentiality intel_iommu=on amd_iommu=on iommu=pt systemd.verity_root_data=/dev/vda1 systemd.verity_root_hash=/dev/vda2 systemd.verity_root_options=panic-on-corruption noresume modprobe.blacklist=ahci i8042.noaux i8042.nokbd"
initrd_modules = ["dm-verity", "dm-mod", "dm-bufio", "squashfs", "virtio-blk", "virtio-pci", "virtio-net", "virtio-scsi", "nf_tables", "nfnetlink", "nf_conntrack"]

[verity]
enabled = true
panic_on_corruption = true

# Shells (bash/sh/dash) are intentionally KEPT — this image's whole purpose
# is to give the SSH user an interactive shell inside an attested CVM.
# We still strip apt/dpkg/pip/dmsetup since the rootfs is read-only verity
# (you can't apt-install anyway) and pip is a common offensive-tooling
# starting point. Belt-and-suspenders.
[security]
remove = ["apt", "apt-get", "apt-cache", "apt-config", "apt-key", "apt-mark", "dpkg", "dpkg-deb", "dpkg-query", "pip", "pip3", "dmsetup"]
remove_dirs = ["/usr/lib/apt", "/var/lib/apt", "/var/lib/dpkg"]
lock_modules = true

# Only kawa (8443) is exposed to the host. SSH stays on loopback.
[firewall]
inbound = [{ port = 8443, proto = "tcp" }]
outbound = "deny"

# Runtime env for kawa's systemd unit. No UPSTREAM_URL — kawa runs
# standalone (any /v1/* request returns the standalone stub) and the
# only thing this kawa actually serves is tunnel.open to port 22.
[config_env]
KAWA_STANDALONE = "true"
KAWA_TUNNEL_PORTS = "22"
ENABLE_PQ = "true"

[services]

[services.network]
ntp_servers = ["162.159.200.1", "162.159.200.123"]

[[services.mounts]]
what = "configfs"
where = "/sys/kernel/config"
type = "configfs"
description = "Kernel Configuration File System"
condition_path_exists = "/sys/kernel/config"

# Generate a fresh ed25519 host key into /run/sshd-keys (tmpfs) at every
# boot. konnect-proxy users pass StrictHostKeyChecking=no because the
# outer kawa attestation already proved the CVM identity — embedding a
# long-lived private host key in a public rootfs would be the wrong trade.
#
# RuntimeDirectory creates /run/sshd-keys (tmpfs, writable for this unit)
# and RuntimeDirectoryPreserve=yes keeps it after the oneshot exits so
# sshd can read the host key. RemainAfterExit goes via extra_options
# because cvmbuild has no top-level field for it.
[[services.units]]
name = "sshd-keygen"
description = "Generate sshd host keys into /run/sshd-keys"
exec = "/usr/local/sbin/sshd-keygen"
service_type = "oneshot"
hardening = "minimal"
after = ["local-fs.target"]
extra_options = [
  "RemainAfterExit=yes",
  "RuntimeDirectory=sshd-keys",
  "RuntimeDirectoryMode=0700",
  "RuntimeDirectoryPreserve=yes",
]

# sshd unit notes:
# - All sshd_config knobs are passed via -o so we don't depend on the
#   /etc/ssh/sshd_config.d/*.conf Include path being honoured (it usually
#   is on Ubuntu, but command-line flags are bulletproof and visible in
#   ps output for debugging).
# - PidFile lives under RuntimeDirectory=sshd → /run/sshd is writable;
#   default /run/sshd.pid would fail because hardening=minimal applies
#   ProtectSystem=strict, which makes /run read-only outside RW paths.
# - PubkeyAuthentication=yes + AuthorizedKeysFile + the kawiri-test
#   pubkey baked into /root/.ssh/authorized_keys (via [overlay.files])
#   are what authenticates the SSH user.
[[services.units]]
name = "sshd"
description = "OpenSSH server (loopback only — reachable via kawa tunnel)"
exec = """\
/usr/sbin/sshd -D -e \
-o ListenAddress=127.0.0.1 -o Port=22 \
-o HostKey=/run/sshd-keys/ssh_host_ed25519_key \
-o PidFile=/run/sshd/sshd.pid \
-o PasswordAuthentication=no -o PermitRootLogin=prohibit-password \
-o PubkeyAuthentication=yes -o AuthorizedKeysFile=/root/.ssh/authorized_keys \
-o UsePAM=no -o X11Forwarding=no -o AllowAgentForwarding=no -o AllowTcpForwarding=no\
"""
after = ["sshd-keygen.service", "network-online.target"]
requires = ["sshd-keygen.service"]
wants = ["network-online.target"]
hardening = "minimal"
# extra_options notes:
# - RuntimeDirectory=sshd creates /run/sshd writable so PidFile= succeeds
#   under hardening=minimal's ProtectSystem=strict (which would otherwise
#   make /run read-only).
# - BindReadOnlyPaths overmounts /etc/passwd inside sshd's namespace with
#   the version that has root=bash (cvmbuild's hardening rewrites the
#   real /etc/passwd to set every login shell to nologin, which would
#   make sshd accept the auth then exec "account not available"). The
#   user shell forked from sshd inherits the namespace so root=bash.
extra_options = [
  "RuntimeDirectory=sshd",
  "RuntimeDirectoryMode=0755",
  "BindReadOnlyPaths=/etc/passwd.sshd:/etc/passwd",
]

[[services.units]]
name = "kawa"
description = "Kawa transport (tunnel mode — relays to sshd on :22)"
exec = "/usr/local/bin/kawa"
after = ["sshd.service", "sys-kernel-config.mount", "network-online.target", "lock-modules.service"]
requires = ["sys-kernel-config.mount"]
wants = ["network-online.target", "sshd.service"]
environment_file = "/mnt/config/config.env"
unset_environment = ["LD_PRELOAD", "LD_LIBRARY_PATH"]
hardening = "full"
read_write_paths = ["/sys/kernel/config"]
device_allow = ["/dev/sev-guest rw", "/dev/tdx-guest rw"]
extra_options = [
  "MemoryDenyWriteExecute=yes",
  "InaccessiblePaths=/dev/shm",
  "ProtectKernelTunables=no",
  "StartLimitBurst=5",
  "StartLimitIntervalSec=60",
]

# Single config disk (env vars only — no models, no inference).
[[verity_disks]]
name = "config"
device = "vdb"
mountpoint = "/mnt/config"
description = "configuration disk"

# No [overlay.files] block — overlay tree is COPY'd directly in the
# Dockerfile because cvmbuild resolves overlay src paths relative to its
# own CWD (teehost's invocation dir), not the image directory. Docker
# COPY against the build context is the unambiguous path.

[manifest]

[manifest.snp]
guest_features = 1
ovmf_file = "OVMF.fd"

[manifest.tdx]
ovmf_file = "OVMF_TDX.fd"

[assert]
profile = "production"
# kawa needs ProtectKernelTunables=no for /sys/kernel/config writes; sshd
# runs at hardening = "minimal" because pam + /etc/passwd + root login
# don't coexist with the locked-down profile (the catalog's
# service_hardening_full_or_minimal check accepts "minimal" — no exclude
# needed there). The kawa unit stays at full hardening so the trust-
# boundary process stays tight.
#
# no_shells / no_shells_extended are excluded because this image's whole
# point is to give the SSH user an interactive shell. apt/dpkg/pip/dmsetup
# are still removed (the read-only verity rootfs makes apt-install a no-op
# anyway, removing pip cuts a common attacker tooling starting point).
exclude = [
  "service_no_protect_kernel_tunables_off",
  "no_shells",
  "no_shells_extended",
]
