# ubuntu-26.04-ssh-cvm — confidential VM with direct SSH
#
# A CVM that exposes sshd directly on port 22 (declared in
# [network].expose_port below). Operators connect with stock SSH — no
# kawa, no konnect-proxy, no tunnel mode. The host management plane
# wires its per-VM port forward to this guest port.
#
# Workflow (host management plane provides the boot/forwarding):
#   1. Boot the VM with this image and get back a host port.
#   2. ssh -i kawiri-test -o StrictHostKeyChecking=no \
#          -o UserKnownHostsFile=/dev/null \
#          -p <host_port> root@<vm-host>
#
# Attestation is verified post-login by reading /sys/kernel/config/tsm/report
# directly inside the CVM (see README) — there is no client-side attestation
# gate before bytes flow. That trade is appropriate for the hosting use case
# where the operator owns the image identity out-of-band and just wants to
# confirm "the host booted what I built".
#
# Security boundary:
#   - TEE (SNP/TDX) protects VM memory + disk against the host operator.
#   - Anyone with kawiri-test's *private* key + a reachable host:port gets
#     root in the VM. The TEST keypair's pubkey is baked into the rootfs
#     (overlay/root/.ssh/authorized_keys); a different pubkey produces a
#     different SNP measurement, which is the right property — production
#     users fork this image and bake their own pubkey.

[image]
id = "ubuntu-26.04-ssh-cvm"
version = "0.5.1"
base = "Dockerfile"
context = "../.."
ovmf_version = "0.1.0"

[kernel]
cmdline = "root=/dev/mapper/root init=/usr/lib/systemd/systemd lockdown=confidentiality intel_iommu=on amd_iommu=on iommu=pt systemd.verity_root_data=/dev/vda1 systemd.verity_root_hash=/dev/vda2 systemd.verity_root_options=panic-on-corruption noresume modprobe.blacklist=ahci i8042.noaux i8042.nokbd"
# Modules added on top of the SSH-only baseline are all here for Docker:
#   - overlay              storage driver (overlay2 is Docker's default)
#   - bridge, br_netfilter container bridge + iptables on bridged traffic
#   - veth                 host↔container network pair
#   - nf_nat, iptable_nat,
#     ip_tables, xt_addrtype,
#     xt_conntrack          container egress NAT + the matchers Docker installs
#   - ipt_MASQUERADE       SNAT for container egress
#   - dm-crypt             LUKS support for the operator's writable data
#                          disk (see "Persistent encrypted storage" in README)
# lock_modules=true seals modprobe after init, so all of these have to be
# loaded from the initrd. Modules built into the host kernel are no-ops in
# this list.
initrd_modules = [
  "dm-verity", "dm-mod", "dm-bufio", "squashfs",
  "virtio-blk", "virtio-pci", "virtio-net", "virtio-scsi",
  "nf_tables", "nfnetlink", "nf_conntrack",
  "overlay",
  "bridge", "br_netfilter", "veth",
  "nf_nat", "iptable_nat", "ip_tables", "ipt_MASQUERADE",
  "xt_addrtype", "xt_conntrack",
  "dm-crypt",
]

[verity]
enabled = true
panic_on_corruption = true

# Shells (bash/sh/dash) are intentionally KEPT — this image's whole purpose
# is to give the SSH user an interactive shell inside an attested CVM. We
# still strip apt/dpkg/pip/dmsetup since the rootfs is read-only verity
# anyway and pip is a common attacker-tooling starting point.
[security]
remove = ["apt", "apt-get", "apt-cache", "apt-config", "apt-key", "apt-mark", "dpkg", "dpkg-deb", "dpkg-query", "pip", "pip3", "dmsetup"]
remove_dirs = ["/usr/lib/apt", "/var/lib/apt", "/var/lib/dpkg"]
lock_modules = true

# sshd is the only inbound TCP listener; the host management plane
# wires its per-VM port forward to CVM:22. ICMP is open so anyone can
# `ping` the VM (handy for liveness checks). Outbound is open ("allow")
# so the operator can `apt update`, `git clone`, `docker pull` etc.
# from inside.
#
# Outbound = "allow" requires excluding `firewall_outbound_deny` from
# the production assert profile (see [assert].exclude below) — that's
# the platform's intentional opt-in for "I am a developer-friendly
# image and accept the responsibility."
[firewall]
inbound = [
  { port = 22, proto = "tcp" },
  { proto = "icmp" },
]
outbound = "allow"

# [network] tells the host management plane:
#   1. Which CVM-side port to forward inbound traffic to (here: 22).
#   2. How to liveness-probe the VM. "none" skips network probing
#      entirely (the real "is the VM up?" signal is the QEMU process
#      state). A TCP probe here would connect-and-close on sshd every
#      few seconds, filling the boot log with `sshd: Connection closed
#      by 10.0.2.2 ...` for no benefit.
[network]
expose_port = 22
probe = "none"

[services]

[services.network]
ntp_servers = ["162.159.200.1", "162.159.200.123"]

[[services.mounts]]
what = "configfs"
where = "/sys/kernel/config"
type = "configfs"
description = "Kernel Configuration File System"
condition_path_exists = "/sys/kernel/config"

# Docker's storage root. The rootfs is read-only verity, so /var/lib/docker
# has nowhere to be persisted on disk. tmpfs is the right trade for an
# ephemeral SSH-CVM: every reboot wipes containers/images, but operators
# can `docker load < init.tar` over SSH after login. Forks that want
# persistent Docker state should add a [[verity_disks]] entry pointing
# to a writable LV mounted here instead — this image stays ephemeral on
# purpose. tmpfs sizing is the kernel default (50% of RAM); operator can
# scale VM memory to match container image sets.
[[services.mounts]]
what = "tmpfs"
where = "/var/lib/docker"
type = "tmpfs"
description = "Docker storage root (ephemeral — overlay2 + container layers)"

# Generate a fresh ed25519 host key into /run/sshd-keys (tmpfs) at every
# boot. Operators pass StrictHostKeyChecking=no since attestation is the
# identity anchor (verified post-SSH via configfs-tsm), not the SSH host
# key. Embedding a long-lived host private key in a public rootfs would
# be the wrong trade.
[[services.units]]
name = "sshd-keygen"
description = "Generate sshd host keys into /run/sshd-keys"
exec = "/usr/local/sbin/sshd-keygen"
service_type = "oneshot"
hardening = "minimal"
after = ["local-fs.target"]
extra_options = [
  "RemainAfterExit=yes",
  "RuntimeDirectory=sshd-keys",
  "RuntimeDirectoryMode=0700",
  "RuntimeDirectoryPreserve=yes",
]

# sshd unit notes:
# - Listens on 0.0.0.0:22 — the per-image [network].expose_port above
#   tells the host management plane where to point its forward, so
#   operators just `ssh -p <host_port> root@host`.
# - All sshd_config knobs passed via -o flags so we don't depend on
#   /etc/ssh/sshd_config.d/*.conf Include behaviour. Visible in `ps`,
#   bulletproof for debugging.
# - PidFile lives under RuntimeDirectory=sshd → /run/sshd is writable;
#   default /run/sshd.pid would fail because hardening=minimal applies
#   ProtectSystem=strict, which makes /run read-only outside RW paths.
# - BindReadOnlyPaths overmounts /etc/passwd inside sshd's namespace
#   with the version that has root=bash (cvmbuild's hardening rewrites
#   the real /etc/passwd to set every login shell to nologin, which
#   would make sshd accept the auth then exec "account not available").
[[services.units]]
name = "sshd"
description = "OpenSSH server (the only inbound surface — direct SSH)"
exec = """\
/usr/sbin/sshd -D -e \
-o ListenAddress=0.0.0.0 -o Port=22 \
-o HostKey=/run/sshd-keys/ssh_host_ed25519_key \
-o PidFile=/run/sshd/sshd.pid \
-o PasswordAuthentication=no -o PermitRootLogin=prohibit-password \
-o PubkeyAuthentication=yes -o AuthorizedKeysFile=/root/.ssh/authorized_keys \
-o UsePAM=no -o X11Forwarding=no -o AllowAgentForwarding=no -o AllowTcpForwarding=no\
"""
after = ["sshd-keygen.service", "network-online.target"]
requires = ["sshd-keygen.service"]
wants = ["network-online.target"]
hardening = "minimal"
extra_options = [
  "RuntimeDirectory=sshd",
  "RuntimeDirectoryMode=0755",
  "BindReadOnlyPaths=/etc/passwd.sshd:/etc/passwd",
]

[manifest]

[manifest.snp]
guest_features = 1
ovmf_file = "OVMF.fd"

[manifest.tdx]
ovmf_file = "OVMF_TDX.fd"

[assert]
profile = "production"
# sshd runs at hardening = "minimal" because pam + /etc/passwd + root
# login don't coexist with the locked-down profile (the catalog's
# service_hardening_full_or_minimal check accepts "minimal" — no exclude
# needed there).
#
# no_shells / no_shells_extended are excluded because this image's whole
# point is to give the SSH user an interactive shell.
#
# firewall_no_ssh is excluded because SSH on port 22 IS the inbound surface
# for this image. The assert is appropriate for chat-only CVMs that should
# never expose 22; here it would block the entire image.
#
# firewall_outbound_deny is excluded because the SSH-CVM is a
# developer-friendly box: the operator owns the VM and wants
# `apt update`, `git clone`, `docker pull` to just work. Open egress
# is the deliberate trade. Inference-image authors leave this assert
# in place to keep their zero-trust posture.
exclude = [
  "no_shells",
  "no_shells_extended",
  "firewall_no_ssh",
  "firewall_outbound_deny",
]
