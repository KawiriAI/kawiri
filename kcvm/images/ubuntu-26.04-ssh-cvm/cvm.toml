# ubuntu-26.04-ssh-cvm — example developer-friendly CVM with direct SSH
#
# A CVM that exposes sshd directly on port 22. Operators connect with
# stock SSH — no kawa, no konnect-proxy, no tunnel mode.
#
# This image is an EXAMPLE / starting template. It deliberately relaxes
# in-VM hardening so the operator inside is unconstrained:
#   - `lock_modules = false` — modprobe works at runtime, so docker can
#     lazy-load `overlay` etc. without us pre-loading anything.
#   - In-VM nftables is masked at boot — the host firewall is the
#     authoritative gate (see /firewall in the host management plane).
#   - /var is a single tmpfs — every /var/lib/* path is writable for
#     containerd, docker, apt, anything else the operator wants.
#
# What stays locked (the structural CVM properties):
#   - Verity rootfs (read-only, panic-on-corruption).
#   - lockdown=confidentiality on the kernel cmdline (no /dev/kmem,
#     no kexec_load, no tracefs reads — required for safe SEV/TDX boot).
#   - SEV-SNP / TDX memory encryption against the host operator.
#
# Production users fork this image, swap the test SSH key, optionally
# add `lock_modules = true` + `[firewall]` rules + tighter mounts for
# their own threat model. This template is permissive ON PURPOSE so
# that "I just want to ssh into a TEE box and play around" works.
#
# Workflow:
#   1. Boot the VM with this image.
#   2. ssh -i kawiri-test -o StrictHostKeyChecking=no \
#          -o UserKnownHostsFile=/dev/null \
#          root@<vm-ip>
#
# Attestation: post-login the operator reads
# /sys/kernel/config/tsm/report directly inside the CVM. The host
# management plane shows the manifest the image was built from.

[image]
id = "ubuntu-26.04-ssh-cvm"
version = "0.5.5"
base = "Dockerfile"
context = "../.."
ovmf_version = "0.1.0"

[kernel]
cmdline = "root=/dev/mapper/root init=/usr/lib/systemd/systemd lockdown=confidentiality intel_iommu=on amd_iommu=on iommu=pt systemd.verity_root_data=/dev/vda1 systemd.verity_root_hash=/dev/vda2 systemd.verity_root_options=panic-on-corruption noresume modprobe.blacklist=ahci i8042.noaux i8042.nokbd"
# Required at-boot modules for the dm-verity → squashfs → systemd
# chain. cvmbuild's assert pass enforces dm-verity + dm-mod here, but
# does NOT add them to the actual initrd — that list lives in the
# kawiri/kcvm/base-image Dockerfile's `dracut --add-drivers` line.
# This block is documentary; for everything beyond the verity boot
# requirements we let modprobe-on-demand handle it (lock_modules=false
# below).
initrd_modules = ["dm-verity", "dm-mod", "dm-bufio", "squashfs"]

[verity]
enabled = true
panic_on_corruption = true

# Shells (bash/sh/dash) are KEPT — this image's point is interactive
# root inside an attested CVM. apt/dpkg/pip/dmsetup are stripped only
# because the rootfs is read-only verity anyway, so the package
# managers couldn't change anything if they tried (and pip is a
# common attacker-tooling stepping stone).
#
# `lock_modules = false`: modprobe works at runtime. The operator IS
# root and is trusted within the VM. Locking modules made sense for
# inference CVMs (where the workload is sealed and a hostile-host
# operator shouldn't be able to drop a rootkit module). For a
# developer SSH box it just blocks docker, eBPF tooling, etc.
[security]
remove = ["apt", "apt-get", "apt-cache", "apt-config", "apt-key", "apt-mark", "dpkg", "dpkg-deb", "dpkg-query", "pip", "pip3", "dmsetup"]
remove_dirs = ["/usr/lib/apt", "/var/lib/apt", "/var/lib/dpkg"]
lock_modules = false

# This block is decorative — the in-VM nftables.service is masked
# in the Dockerfile (`ln -sf /dev/null /etc/systemd/system/nftables.service`)
# so /etc/nftables.conf never loads. Reachability is gated entirely
# by the HOST firewall (see /firewall in the host management plane).
#
# We keep the inbound list here so the host's port-22 forward is
# documented as the intended ingress, and so cvmbuild's
# `firewall_no_ssh` assert sees a matching rule. Outbound stays
# `allow` so apt/git/docker-pull etc. work — `firewall_outbound_deny`
# is excluded below.
[firewall]
inbound = [
  { port = 22, proto = "tcp" },
  { proto = "icmp" },
]
outbound = "allow"

# [network] tells the host management plane:
#   1. Which CVM-side port to forward inbound traffic to (here: 22).
#   2. How to liveness-probe the VM. "none" skips network probing
#      (the real "is the VM up?" signal is the QEMU process state).
[network]
expose_port = 22
probe = "none"

[services]

[services.network]
ntp_servers = ["162.159.200.1", "162.159.200.123"]

[[services.mounts]]
what = "configfs"
where = "/sys/kernel/config"
type = "configfs"
description = "Kernel Configuration File System"
condition_path_exists = "/sys/kernel/config"

# /var as a single tmpfs. Replaces what used to be four per-subdir
# mounts (/var/lib/docker, /var/lib/containerd, /run/docker, /run/containerd
# — plus cvmbuild's own /var/log + /var/lib/systemd entries). The whole
# /var becomes RAM-backed: writable, fast, ephemeral. The verity
# rootfs's /var contents (mostly empty after cvmbuild strips dpkg/apt)
# are shadowed.
#
# This is the right trade for a developer image:
#   - operators expect /var/lib/* to be writable
#   - persistent state belongs on a verity_disk anyway, not /var
#   - "lost on reboot" matches the ephemeral SSH-CVM mental model
[[services.mounts]]
what = "tmpfs"
where = "/var"
type = "tmpfs"
description = "Writable /var (RAM-backed, ephemeral)"

# Generate a fresh ed25519 host key into /run/sshd-keys (tmpfs) at every
# boot. Operators pass StrictHostKeyChecking=no since attestation is the
# identity anchor (verified post-SSH via configfs-tsm), not the SSH host
# key.
[[services.units]]
name = "sshd-keygen"
description = "Generate sshd host keys into /run/sshd-keys"
exec = "/usr/local/sbin/sshd-keygen"
service_type = "oneshot"
hardening = "minimal"
after = ["local-fs.target"]
extra_options = [
  "RemainAfterExit=yes",
  "RuntimeDirectory=sshd-keys",
  "RuntimeDirectoryMode=0700",
  "RuntimeDirectoryPreserve=yes",
]

# sshd unit notes:
# - Listens on 0.0.0.0:22.
# - All sshd_config knobs passed via -o flags so we don't depend on
#   /etc/ssh/sshd_config.d/*.conf Include behaviour. Visible in `ps`,
#   bulletproof for debugging.
# - PidFile lives under RuntimeDirectory=sshd → /run/sshd is writable.
# - BindReadOnlyPaths overmounts /etc/passwd inside sshd's namespace
#   with the version that has root=bash (cvmbuild's hardening rewrites
#   the real /etc/passwd to set every login shell to nologin).
[[services.units]]
name = "sshd"
description = "OpenSSH server (the only inbound surface — direct SSH)"
exec = """\
/usr/sbin/sshd -D -e \
-o ListenAddress=0.0.0.0 -o Port=22 \
-o HostKey=/run/sshd-keys/ssh_host_ed25519_key \
-o PidFile=/run/sshd/sshd.pid \
-o PasswordAuthentication=no -o PermitRootLogin=prohibit-password \
-o PubkeyAuthentication=yes -o AuthorizedKeysFile=/root/.ssh/authorized_keys \
-o UsePAM=no -o X11Forwarding=no -o AllowAgentForwarding=no -o AllowTcpForwarding=no\
"""
after = ["sshd-keygen.service", "network-online.target"]
requires = ["sshd-keygen.service"]
wants = ["network-online.target"]
hardening = "minimal"
extra_options = [
  "RuntimeDirectory=sshd",
  "RuntimeDirectoryMode=0755",
  "BindReadOnlyPaths=/etc/passwd.sshd:/etc/passwd",
]

[manifest]

[manifest.snp]
guest_features = 1
ovmf_file = "OVMF.fd"

[manifest.tdx]
ovmf_file = "OVMF_TDX.fd"

[assert]
profile = "production"
# sshd runs at hardening=minimal because pam + /etc/passwd + root login
# don't coexist with the locked-down profile.
#
# no_shells/no_shells_extended excluded — this image is an interactive shell.
#
# firewall_no_ssh excluded — SSH on port 22 IS the inbound surface.
#
# firewall_outbound_deny excluded — developer image, open egress is the
# deliberate trade so apt/git/docker-pull work.
#
# modules_locked excluded — `lock_modules = false` is intentional for
# this image. Production users fork and re-enable.
exclude = [
  "no_shells",
  "no_shells_extended",
  "firewall_no_ssh",
  "firewall_outbound_deny",
  "modules_locked",
]
