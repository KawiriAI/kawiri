# ubuntu-26.04-ssh-cvm — confidential VM with direct SSH
#
# A CVM that exposes sshd directly on the port teehost forwards (kawa's
# default 8443, so no teehost change is needed). Operators connect
# straight with stock SSH — no kawa, no konnect-proxy, no tunnel mode.
#
# Workflow:
#   curl -X POST http://localhost:8800/api/v1/vms \
#        -d '{"image_dir":"…/ubuntu-26.04-ssh-cvm","tee":"snp",…}'
#   → {"id":"vm-…","host_port":18443,…}
#   ssh -i kawiri-test -o StrictHostKeyChecking=no \
#       -o UserKnownHostsFile=/dev/null \
#       -p 18443 root@<vm-host>
#
# Attestation is verified post-login by reading /sys/kernel/config/tsm/report
# directly inside the CVM (see README) — there is no client-side attestation
# gate before bytes flow. That trade is appropriate for the hosting use case
# where the operator owns the image identity out-of-band and just wants to
# confirm "the host booted what I built".
#
# Security boundary:
#   - TEE (SNP/TDX) protects VM memory + disk against the host operator.
#   - Anyone with kawiri-test's *private* key + a reachable host:port gets
#     root in the VM. The TEST keypair's pubkey is baked into the rootfs
#     (overlay/root/.ssh/authorized_keys); a different pubkey produces a
#     different SNP measurement, which is the right property — production
#     users fork this image and bake their own pubkey.

[image]
id = "ubuntu-26.04-ssh-cvm"
version = "0.2.0"
base = "Dockerfile"
context = "../.."
ovmf_version = "0.1.0"

[kernel]
cmdline = "root=/dev/mapper/root init=/usr/lib/systemd/systemd lockdown=confidentiality intel_iommu=on amd_iommu=on iommu=pt systemd.verity_root_data=/dev/vda1 systemd.verity_root_hash=/dev/vda2 systemd.verity_root_options=panic-on-corruption noresume modprobe.blacklist=ahci i8042.noaux i8042.nokbd"
initrd_modules = ["dm-verity", "dm-mod", "dm-bufio", "squashfs", "virtio-blk", "virtio-pci", "virtio-net", "virtio-scsi", "nf_tables", "nfnetlink", "nf_conntrack"]

[verity]
enabled = true
panic_on_corruption = true

# Shells (bash/sh/dash) are intentionally KEPT — this image's whole purpose
# is to give the SSH user an interactive shell inside an attested CVM. We
# still strip apt/dpkg/pip/dmsetup since the rootfs is read-only verity
# anyway and pip is a common attacker-tooling starting point.
[security]
remove = ["apt", "apt-get", "apt-cache", "apt-config", "apt-key", "apt-mark", "dpkg", "dpkg-deb", "dpkg-query", "pip", "pip3", "dmsetup"]
remove_dirs = ["/usr/lib/apt", "/var/lib/apt", "/var/lib/dpkg"]
lock_modules = true

# sshd is the only inbound listener; teehost's per-VM hostfwd targets
# CVM:22 (declared in [network] below) so this image looks like normal
# SSH from outside.
[firewall]
inbound = [{ port = 22, proto = "tcp" }]
outbound = "deny"

# teehost reads [network] to decide:
#   1. Which CVM-side port to wire its hostfwd to (host:<host_port> → :22)
#   2. How to liveness-probe the VM. "none" skips network probing entirely
#      (the real "is the VM up?" signal is the QEMU process state, which
#      teehost already tracks via vm.state). A TCP probe here would
#      connect-and-close on sshd every few seconds, filling the boot log
#      with `sshd: Connection closed by 10.0.2.2 ...` for no benefit.
[network]
expose_port = 22
probe = "none"

[services]

[services.network]
ntp_servers = ["162.159.200.1", "162.159.200.123"]

[[services.mounts]]
what = "configfs"
where = "/sys/kernel/config"
type = "configfs"
description = "Kernel Configuration File System"
condition_path_exists = "/sys/kernel/config"

# Generate a fresh ed25519 host key into /run/sshd-keys (tmpfs) at every
# boot. Operators pass StrictHostKeyChecking=no since attestation is the
# identity anchor (verified post-SSH via configfs-tsm), not the SSH host
# key. Embedding a long-lived host private key in a public rootfs would
# be the wrong trade.
[[services.units]]
name = "sshd-keygen"
description = "Generate sshd host keys into /run/sshd-keys"
exec = "/usr/local/sbin/sshd-keygen"
service_type = "oneshot"
hardening = "minimal"
after = ["local-fs.target"]
extra_options = [
  "RemainAfterExit=yes",
  "RuntimeDirectory=sshd-keys",
  "RuntimeDirectoryMode=0700",
  "RuntimeDirectoryPreserve=yes",
]

# sshd unit notes:
# - Listens on 0.0.0.0:22 — teehost's hostfwd is now per-image
#   ([network].expose_port above), so no need to ride the legacy 8443
#   convention. Operators just `ssh -p <host_port> root@host`.
# - All sshd_config knobs passed via -o flags so we don't depend on
#   /etc/ssh/sshd_config.d/*.conf Include behaviour. Visible in `ps`,
#   bulletproof for debugging.
# - PidFile lives under RuntimeDirectory=sshd → /run/sshd is writable;
#   default /run/sshd.pid would fail because hardening=minimal applies
#   ProtectSystem=strict, which makes /run read-only outside RW paths.
# - BindReadOnlyPaths overmounts /etc/passwd inside sshd's namespace
#   with the version that has root=bash (cvmbuild's hardening rewrites
#   the real /etc/passwd to set every login shell to nologin, which
#   would make sshd accept the auth then exec "account not available").
[[services.units]]
name = "sshd"
description = "OpenSSH server (the only inbound surface — direct SSH)"
exec = """\
/usr/sbin/sshd -D -e \
-o ListenAddress=0.0.0.0 -o Port=22 \
-o HostKey=/run/sshd-keys/ssh_host_ed25519_key \
-o PidFile=/run/sshd/sshd.pid \
-o PasswordAuthentication=no -o PermitRootLogin=prohibit-password \
-o PubkeyAuthentication=yes -o AuthorizedKeysFile=/root/.ssh/authorized_keys \
-o UsePAM=no -o X11Forwarding=no -o AllowAgentForwarding=no -o AllowTcpForwarding=no\
"""
after = ["sshd-keygen.service", "network-online.target"]
requires = ["sshd-keygen.service"]
wants = ["network-online.target"]
hardening = "minimal"
extra_options = [
  "RuntimeDirectory=sshd",
  "RuntimeDirectoryMode=0755",
  "BindReadOnlyPaths=/etc/passwd.sshd:/etc/passwd",
]

[manifest]

[manifest.snp]
guest_features = 1
ovmf_file = "OVMF.fd"

[manifest.tdx]
ovmf_file = "OVMF_TDX.fd"

[assert]
profile = "production"
# sshd runs at hardening = "minimal" because pam + /etc/passwd + root
# login don't coexist with the locked-down profile (the catalog's
# service_hardening_full_or_minimal check accepts "minimal" — no exclude
# needed there).
#
# no_shells / no_shells_extended are excluded because this image's whole
# point is to give the SSH user an interactive shell.
#
# firewall_no_ssh is excluded because SSH on port 22 IS the inbound surface
# for this image. The assert is appropriate for chat-only CVMs that should
# never expose 22; here it would block the entire image.
exclude = [
  "no_shells",
  "no_shells_extended",
  "firewall_no_ssh",
]
