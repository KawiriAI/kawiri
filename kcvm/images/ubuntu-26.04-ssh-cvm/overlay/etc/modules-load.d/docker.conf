# Modules Docker (and containerd) need at runtime.
#
# Why this file exists: cvmbuild's lock-modules.service flips
# kernel.modules_disabled=1 a few seconds after boot, and after that
# sysctl is set every modprobe returns EPERM with no log line — even
# for properly-signed Ubuntu modules. So Docker can't lazy-load `overlay`
# the way it does on a stock host.
#
# systemd-modules-load.service runs entries in /etc/modules-load.d/
# BEFORE lock-modules.service (the latter has
# `After=systemd-modules-load.service` set), so anything listed here
# is loaded into the kernel while the modules_disabled gate is still
# open. After lock-modules.service runs, no further loads succeed —
# but these are already in, so Docker finds them via lsmod.
#
# Don't add ipt_MASQUERADE here — it's been folded into nf_nat in
# modern kernels and trying to modprobe it fails with "module not
# found." iptables -t nat -A POSTROUTING -j MASQUERADE works without
# it as long as nf_nat is loaded.

# Storage: overlay2 (Docker default)
overlay

# Networking: docker0 bridge + iptables on bridged traffic + container veth pair
bridge
br_netfilter
veth

# NAT (container egress)
nf_nat
iptable_nat
ip_tables
xt_addrtype
xt_conntrack
