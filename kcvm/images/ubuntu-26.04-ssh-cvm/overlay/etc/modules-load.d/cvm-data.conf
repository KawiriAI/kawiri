# Pre-load dm-crypt at boot so `cryptsetup luksOpen` on the operator's
# data disk just works without a manual `modprobe dm_crypt` first.
#
# The kernel's auto-load triggers on hot-plug events and on a few
# specific syscalls, but doesn't fire when cryptsetup tries to add a
# `crypt` target via the device-mapper interface — modprobe-on-demand
# misses that path. lock_modules = false in this image makes runtime
# modprobe possible, but pre-loading at boot via systemd-modules-load
# means the operator never has to think about it.
dm-crypt
