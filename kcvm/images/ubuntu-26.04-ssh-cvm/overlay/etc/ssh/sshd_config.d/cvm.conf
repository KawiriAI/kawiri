# SSH server config for ubuntu-26.04-ssh-cvm.
#
# The CVM is reachable from the outside ONLY via kawa's encrypted tunnel
# (port 8443, attestation-gated). sshd binds 127.0.0.1 because the tunnel
# terminates there inside the CVM. No public SSH surface exists.
#
# Auth: pubkey only. PasswordAuthentication is off because the encrypted+
# attested transport buys you nothing if any password could open a shell.
#
# Host keys: /run/sshd-keys is a tmpfs populated at boot by
# sshd-keygen.service. Fresh host key per boot; konnect-proxy users pass
# StrictHostKeyChecking=no since attestation already proved the CVM
# identity at handshake time.

ListenAddress 127.0.0.1
Port 22

HostKey /run/sshd-keys/ssh_host_ed25519_key

PermitRootLogin prohibit-password
PasswordAuthentication no
ChallengeResponseAuthentication no
KbdInteractiveAuthentication no
PubkeyAuthentication yes
UsePAM no

AuthorizedKeysFile /root/.ssh/authorized_keys

# Verity rootfs is read-only — disable features that try to write to /etc.
PrintMotd no
PrintLastLog no
X11Forwarding no
AllowAgentForwarding no
AllowTcpForwarding no

# Single host key, no need to advertise others.
HostKeyAlgorithms ssh-ed25519
PubkeyAcceptedAlgorithms ssh-ed25519
