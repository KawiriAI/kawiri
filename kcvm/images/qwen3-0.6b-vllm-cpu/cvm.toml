# CVM image configuration — kawiri-cvm
# Built by cvmbuild (pure Rust CVM image builder)

[image]
id = "qwen3-0.6b-vllm-cpu"
version = "0.1.0"
base = "Dockerfile"
context = "../.."
base_image = "cvm-base:latest"
base_image_dockerfile = "base-image/Dockerfile"
kawa_version = "0.1.1"
ovmf_version = "0.1.0"

[kernel]
cmdline = "root=/dev/mapper/root init=/usr/lib/systemd/systemd lockdown=confidentiality intel_iommu=on amd_iommu=on iommu=pt systemd.verity_root_options=panic-on-corruption noresume modprobe.blacklist=ahci i8042.noaux i8042.nokbd"
initrd_modules = ["dm-verity", "dm-mod", "dm-bufio", "squashfs", "virtio-blk", "virtio-pci", "virtio-net", "virtio-scsi", "nf_tables", "nfnetlink", "nf_conntrack"]

[verity]
enabled = true
panic_on_corruption = true

[security]
remove = ["bash", "sh", "dash", "csh", "tcsh", "zsh", "fish", "ksh", "rbash", "busybox", "apt", "apt-get", "apt-cache", "apt-config", "apt-key", "apt-mark", "dpkg", "dpkg-deb", "dpkg-query", "pip", "pip3", "dmsetup"]
remove_dirs = ["/usr/lib/apt", "/var/lib/apt", "/var/lib/dpkg", "/usr/lib/python3/dist-packages/pip"]
lock_modules = true

# Binary hash pinning — update after each container rebuild:
#   sha256sum build/rootfs/usr/local/bin/kawa
#   sha256sum build/rootfs/usr/local/bin/vllm-launcher
# [[security.verify_hashes]]
# path = "/usr/local/bin/kawa"
# sha256 = "<sha256 of kawa binary>"
# [[security.verify_hashes]]
# path = "/usr/local/bin/vllm-launcher"
# sha256 = "<sha256 of vllm-launcher>"

[firewall]
inbound = [{ port = 8443, proto = "tcp" }]
outbound = "deny"

[[verity_disks]]
name = "models"
device = "vdb"
mountpoint = "/mnt/models"
description = "model weights disk"
source = "disks/models"

[[verity_disks]]
name = "config"
device = "vdc"
mountpoint = "/mnt/config"
description = "configuration disk"

# Runtime environment variables — written to config.env on the config verity disk
[config_env]
VLLM_MODEL = "/mnt/models/Qwen3-0.6B"
VLLM_SERVED_MODEL_NAME = "Qwen3-0.6B"
VLLM_MAX_MODEL_LEN = "2048"
VLLM_MAX_NUM_SEQS = "4"
ENABLE_PQ = "true"

# Models — downloaded by cvmbuild during build
[[models]]
repo = "Qwen/Qwen3-0.6B"

# Services
[services]

[services.network]
ntp_servers = ["162.159.200.1", "162.159.200.123"]

[[services.groups]]
name = "vllm-ipc"

[[services.mounts]]
what = "configfs"
where = "/sys/kernel/config"
type = "configfs"
description = "Kernel Configuration File System"
condition_path_exists = "/sys/kernel/config"

[[services.units]]
name = "vllm"
description = "vLLM inference engine"
exec = "/usr/local/bin/vllm-launcher"
after = ["verity-config.service", "verity-models.service", "lock-modules.service"]
requires = ["verity-config.service", "verity-models.service"]
environment_file = "/mnt/config/config.env"
environment = ["DO_NOT_TRACK=1", "HOME=/run/vllm", "VLLM_CPU_OMP_THREADS_BIND=nobind", "TORCH_COMPILE_DISABLE=1"]
unset_environment = ["LD_PRELOAD", "LD_LIBRARY_PATH", "PYTHONPATH"]
hardening = "full"
user = "vllm"
group = "vllm-ipc"
supplementary_groups = ["video", "render"]
extra_options = [
  "SystemCallFilter=@system-service @resources @ipc ioctl mmap mprotect",
  "RestrictNamespaces=no",
  "RuntimeDirectory=vllm",
  "RuntimeDirectoryMode=0750",
  "UMask=0007",
  "TimeoutStartSec=1800",
  "StartLimitBurst=3",
  "StartLimitIntervalSec=120",
]

[[services.units]]
name = "kawa"
description = "Kawa Noise_XX TLS proxy"
exec = "/usr/local/bin/kawa"
after = ["vllm.service", "verity-config.service", "sys-kernel-config.mount", "network-online.target", "lock-modules.service"]
requires = ["verity-config.service", "sys-kernel-config.mount"]
wants = ["network-online.target", "vllm.service"]
environment_file = "/mnt/config/config.env"
unset_environment = ["LD_PRELOAD", "LD_LIBRARY_PATH", "PYTHONPATH", "NODE_OPTIONS"]
hardening = "full"
supplementary_groups = ["vllm-ipc"]
read_write_paths = ["/sys/kernel/config"]
device_allow = ["/dev/sev-guest rw", "/dev/tdx-guest rw"]
extra_options = [
  "MemoryDenyWriteExecute=yes",
  "InaccessiblePaths=/dev/shm",
  "ProtectKernelTunables=no",
  "StartLimitBurst=5",
  "StartLimitIntervalSec=60",
]

[manifest]

[manifest.snp]
# SEV_FEATURES: 0x1 = SnpActive, 0x21 = SnpActive + RestrictedInjection
guest_features = 1
ovmf_file = "OVMF.fd"

[manifest.tdx]
ovmf_file = "OVMF_TDX.fd"

# Security assertion profile — validates config against security policy
[assert]
profile = "production"
# kawa needs ProtectKernelTunables=no for /sys/kernel/config (SEV-SNP tsm attestation)
exclude = ["service_no_protect_kernel_tunables_off"]
