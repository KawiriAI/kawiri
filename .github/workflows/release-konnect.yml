name: Release konnect

on:
  push:
    tags: ['konnect-v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#konnect-v}"
          PKG_VERSION=$(node -p "require('./konnect/package.json').version")
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag konnect-v${TAG_VERSION} does not match konnect/package.json version (${PKG_VERSION})"
            exit 1
          fi

      - run: bun install --frozen-lockfile
        working-directory: konnect

      - run: bun build core/mod.ts --outdir dist --target browser --format esm --sourcemap=external
        working-directory: konnect

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          ARCHIVE="konnect-${TAG#konnect-}.tar.gz"
          tar czf "$ARCHIVE" -C konnect/dist .
          sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            "$ARCHIVE" \
            "$ARCHIVE.sha256"
