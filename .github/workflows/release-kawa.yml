name: Release kawa

on:
  push:
    tags: ['kawa-v*']
  # Lets us re-run for an existing tag (e.g. to backfill the mocktee
  # artifact onto a release that was cut before this workflow learned
  # about it). The build + upload steps use `--clobber`, so re-runs are
  # safe — they replace whatever was there.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to re-release (e.g. kawa-v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - run: sudo apt-get update && sudo apt-get install -y musl-tools musl-dev

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: kawa

      - name: Resolve tag + verify Cargo.toml version
        id: meta
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          TAG_VERSION="${TAG#kawa-v}"
          CARGO_VERSION=$(grep '^version' kawa/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag kawa-v${TAG_VERSION} does not match kawa/Cargo.toml version (${CARGO_VERSION})"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      # ── Production build (TEE attestation required at runtime) ────
      - name: Build production kawa
        run: cargo build --release --target x86_64-unknown-linux-musl
        working-directory: kawa

      - name: Package production kawa
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          ARCHIVE="kawa-${TAG#kawa-}-linux-x86_64.tar.gz"
          cp kawa/target/x86_64-unknown-linux-musl/release/kawa kawa-bin
          tar czf "$ARCHIVE" -C . kawa-bin LICENSE
          sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"
          rm kawa-bin

      # ── Mock-TEE build (dev/test only, never deploy in a CVM) ─────
      # Same source, same tag, second build with `--features mock`.
      # The mock variant is gated at compile time (#[cfg(feature = "mock")])
      # so production builds cannot be coerced into mock mode by any
      # runtime flag. This artifact exists for laptop/CI testing of the
      # full Noise + X-Wing handshake without TEE hardware.
      - name: Build mock-TEE kawa
        run: cargo build --release --features mock --target x86_64-unknown-linux-musl
        working-directory: kawa

      - name: Package mock-TEE kawa
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          ARCHIVE="kawa-mocktee-${TAG#kawa-}-linux-x86_64.tar.gz"
          cp kawa/target/x86_64-unknown-linux-musl/release/kawa kawa-bin
          tar czf "$ARCHIVE" -C . kawa-bin LICENSE
          sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"
          rm kawa-bin

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          PROD="kawa-${TAG#kawa-}-linux-x86_64.tar.gz"
          MOCK="kawa-mocktee-${TAG#kawa-}-linux-x86_64.tar.gz"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG exists — uploading with --clobber"
            gh release upload "$TAG" --clobber \
              "$PROD" "$PROD.sha256" \
              "$MOCK" "$MOCK.sha256"
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes "Production binary: \`kawa-${TAG#kawa-}-linux-x86_64.tar.gz\`
              Used by cvmbuild as the kawa pinned version. Reads attestation from /sys/kernel/config/tsm/report — only works inside a real SEV-SNP / TDX guest.

              Mock-TEE binary: \`kawa-mocktee-${TAG#kawa-}-linux-x86_64.tar.gz\`
              **Dev/test only — never deploy in a CVM image.** Returns deterministic fake attestation reports so the full Noise + X-Wing handshake can be exercised on a laptop or in CI without TEE hardware. Konnect must be configured to accept the mock report (skip-attestation or mock-mode validator) for the handshake to complete." \
              "$PROD" "$PROD.sha256" \
              "$MOCK" "$MOCK.sha256"
          fi
