name: Release kawa

on:
  push:
    tags: ['kawa-v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to re-release (e.g. kawa-v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - run: sudo apt-get update && sudo apt-get install -y musl-tools musl-dev

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: kawa

      - name: Resolve tag + verify Cargo.toml version
        id: meta
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          TAG_VERSION="${TAG#kawa-v}"
          CARGO_VERSION=$(grep '^version' kawa/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag kawa-v${TAG_VERSION} does not match kawa/Cargo.toml version (${CARGO_VERSION})"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      # Single-binary build: kawa runtime-detects whether configfs-tsm offers
      # a usable TSM provider at startup. Real TEE → signed quotes; non-TEE →
      # loud per-message mock-attestation warnings (and konnect's default
      # KattValidator rejects platform=="mock").
      - name: Build kawa
        run: cargo build --release --target x86_64-unknown-linux-musl
        working-directory: kawa

      - name: Package kawa
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          ARCHIVE="kawa-${TAG#kawa-}-linux-x86_64.tar.gz"
          cp kawa/target/x86_64-unknown-linux-musl/release/kawa kawa-bin
          tar czf "$ARCHIVE" -C . kawa-bin LICENSE
          sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"
          rm kawa-bin

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          PROD="kawa-${TAG#kawa-}-linux-x86_64.tar.gz"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG exists — uploading with --clobber"
            gh release upload "$TAG" --clobber "$PROD" "$PROD.sha256"
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes "Single-binary kawa for x86_64-linux-musl.

              Runtime-detects TEE: opens \`/sys/kernel/config/tsm/report\` at startup. If a usable TSM provider answers, real SEV-SNP / TDX attestation is served; otherwise kawa runs in mock mode and serves a clearly-marked \`platform: \"mock\"\` payload. Konnect's default KattValidator rejects mock payloads — production deployments stay safe regardless. Mock mode emits a loud WARN at startup, on every served handshake, and on every message in the transport loop." \
              "$PROD" "$PROD.sha256"
          fi
