name: Mirror kcvm to R2

# On push to main, mirror kcvm/{base-image,images}/ → s3://<bucket>/.
# Bucket layout 1:1 with the source dirs:
#   base-image/Dockerfile
#   images/<id>/{cvm.toml, Dockerfile, manifest.expected.json}
#
# build.sh and any other kcvm/ siblings are excluded — the bucket holds only
# what teehost / cvmbuild consume on a deployed host.
#
# Required secrets:
#   R2_ACCOUNT_ID         — Cloudflare account ID
#   R2_ACCESS_KEY_ID      — R2 API token, scoped to the bucket, read+write
#   R2_SECRET_ACCESS_KEY  — paired secret
#   R2_BUCKET             — bucket name (e.g. teehost-images)

on:
  push:
    branches: [main]
    paths:
      - 'kcvm/base-image/**'
      - 'kcvm/images/**'
      - '.github/workflows/kcvm-publish.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: kcvm-publish-main
  cancel-in-progress: false

env:
  AWS_DEFAULT_REGION: auto
  AWS_ENDPOINT_URL: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
  AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  R2_BUCKET: ${{ secrets.R2_BUCKET }}

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Verify required secrets are present
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          missing=0
          for v in R2_ACCOUNT_ID R2_ACCESS_KEY_ID R2_SECRET_ACCESS_KEY R2_BUCKET; do
            if [ -z "${!v:-}" ]; then
              echo "::error::missing secret $v"
              missing=1
            fi
          done
          [ $missing -eq 0 ]

      - name: Mirror base-image/
        run: |
          aws s3 sync kcvm/base-image/ "s3://${R2_BUCKET}/base-image/" \
            --delete --no-progress

      - name: Mirror images/
        run: |
          aws s3 sync kcvm/images/ "s3://${R2_BUCKET}/images/" \
            --delete --no-progress

      - name: Job summary
        if: always()
        run: |
          {
            echo "### kcvm mirror to R2"
            echo ""
            echo "- Bucket: \`${R2_BUCKET}\`"
            echo "- Endpoint: \`${AWS_ENDPOINT_URL}\`"
            echo "- Commit: \`${GITHUB_SHA:0:12}\`"
          } >> "$GITHUB_STEP_SUMMARY"
