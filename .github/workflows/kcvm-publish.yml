name: Mirror kcvm to bucket

# On push to main, mirror kcvm/{base-image,images}/ to an S3-compatible bucket.
# Bucket layout 1:1 with the source dirs:
#   base-image/Dockerfile
#   images/<id>/{cvm.toml, Dockerfile, manifest.expected.json}
#
# build.sh and other kcvm/ siblings are excluded — the bucket holds only what
# teehost / cvmbuild consume on a deployed host.
#
# Required secrets:
#   AWS_ENDPOINT_URL       — full S3 endpoint URL (any S3-compatible backend)
#   AWS_ACCESS_KEY_ID      — credential pair, scoped to the bucket, read+write
#   AWS_SECRET_ACCESS_KEY  — paired secret
#   KCVM_BUCKET            — bucket name

on:
  push:
    branches: [main]
    paths:
      - 'kcvm/base-image/**'
      - 'kcvm/images/**'
      - '.github/workflows/kcvm-publish.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: kcvm-publish-main
  cancel-in-progress: false

env:
  AWS_DEFAULT_REGION: auto
  AWS_ENDPOINT_URL: ${{ secrets.AWS_ENDPOINT_URL }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  KCVM_BUCKET: ${{ secrets.KCVM_BUCKET }}

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Verify required secrets are present
        run: |
          missing=0
          for v in AWS_ENDPOINT_URL AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY KCVM_BUCKET; do
            if [ -z "${!v:-}" ]; then
              echo "::error::missing secret $v"
              missing=1
            fi
          done
          [ $missing -eq 0 ]

      - name: Mirror base-image/
        run: |
          aws s3 sync kcvm/base-image/ "s3://${KCVM_BUCKET}/base-image/" \
            --delete --no-progress

      - name: Mirror images/
        # Exclude */build/* so the source-mirror's --delete doesn't wipe the
        # `build/` artifacts that teehost uploads back into each image's
        # prefix after a successful local build. CI only owns the source files
        # (cvm.toml, Dockerfile, manifest.expected.json); teehost owns build/.
        run: |
          aws s3 sync kcvm/images/ "s3://${KCVM_BUCKET}/images/" \
            --delete --no-progress \
            --exclude '*/build/*'

      - name: Job summary
        if: always()
        run: |
          {
            echo "### kcvm mirror"
            echo ""
            echo "- Bucket: \`${KCVM_BUCKET}\`"
            echo "- Commit: \`${GITHUB_SHA:0:12}\`"
          } >> "$GITHUB_STEP_SUMMARY"
